name: Deploy MCP Worker

# Deploy the remote MCP server (apps/mcp-worker) to Cloudflare Workers.
# Requires a CLOUDFLARE_API_TOKEN repo secret with Workers Scripts:Edit +
# Workers Durable Objects + Account Rate Limits permissions.

on:
  push:
    branches: [main]
    paths:
      - "apps/mcp-worker/**"
      - "packages/mcp/**"
      - "packages/sdk/**"
      - ".github/workflows/deploy-mcp-worker.yml"
  workflow_dispatch:

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: deploy-mcp-worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Builds @printr/sdk + @printr/mcp; the worker bundles @printr/mcp/remote-safe.
      - name: Build packages
        run: bun run build

      - name: Deploy worker
        run: bunx wrangler deploy
        working-directory: apps/mcp-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
