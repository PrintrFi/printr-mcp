name: Deploy MCP Worker

# Deploy the remote MCP server (apps/mcp-worker) to Cloudflare Workers.
#   - push to main (touching the worker/sdk/mcp) -> deploy STAGING automatically
#   - manual dispatch -> deploy the chosen environment (promote staging -> production)
# Requires a CLOUDFLARE_API_TOKEN repo secret with Workers Scripts:Edit +
# Workers Durable Objects + Account Rate Limits permissions.

on:
  push:
    branches: [main]
    paths:
      - "apps/mcp-worker/**"
      - "packages/mcp/**"
      - "packages/sdk/**"
      - ".github/workflows/deploy-mcp-worker.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [staging, production]
        default: production

# Serialize deploys per target environment.
concurrency:
  group: deploy-mcp-worker-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Builds @printr/sdk + @printr/mcp; the worker bundles @printr/mcp/remote-safe.
      - name: Build packages
        run: bun run build

      - name: Deploy worker
        working-directory: apps/mcp-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # push -> staging; manual dispatch -> chosen environment.
          TARGET: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
        run: |
          if [ "$TARGET" = "production" ]; then
            echo "Deploying to production"
            bunx wrangler deploy
          else
            echo "Deploying to staging"
            bunx wrangler deploy --env staging
          fi
