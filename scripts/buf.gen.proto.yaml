version: v2
managed:
  enabled: true
plugins:
  - remote: buf.build/bufbuild/es:v1.10.0
    out: PRINTR_MCP_SDK_PROTO_OUT
    include_imports: true
    opt:
      - target=ts
  - remote: buf.build/connectrpc/es:v1.6.1
    out: PRINTR_MCP_SDK_PROTO_OUT
    include_imports: true
    opt:
      - target=ts
inputs:
  - directory: proto/printrfi
    paths:
      - proto/printrfi/api
      - proto/printrfi/caip
      - proto/printrfi/chains
      - proto/printrfi/wingman
      - proto/printrfi/pig
